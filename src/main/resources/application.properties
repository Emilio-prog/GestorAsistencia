# ============================================================
# Configuración base de la aplicación Gestor de Asistencia
# ============================================================

# Nombre lógico de la aplicación para Spring Boot.
spring.application.name=gestionasistencia

# Configuración de MongoDB Atlas.
# La cadena de conexión NO se versiona: se lee de la variable de entorno
# de sistema MONGODB_URI. Ejemplo de valor esperado:
# mongodb+srv://usuario:password@cluster.mongodb.net/basedatos?appName=NombreApp
spring.data.mongodb.uri=${MONGODB_URI}

# Nivel de logs de MongoTemplate para ver consultas en consola durante depuración.
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG
