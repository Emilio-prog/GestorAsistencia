<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body style="margin: 0; padding: 0; background-color: #F8FAFC;">
    <div style="font-family: 'Tahoma', sans-serif; background-color: #F8FAFC; padding: 40px 10px; text-align: center;">
        <div style="max-width: 450px; margin: 0 auto; border: 2px solid #0058E6; border-radius: 6px 6px 0 0; box-shadow: 4px 4px 10px rgba(0,0,0,0.15); overflow: hidden;">
            <!-- Barra de título estilo Windows XP -->
            <div style="background: linear-gradient(to bottom, #0058E6 0%, #3A93FF 8%, #288EFF 40%, #127DFF 88%, #036BFE 100%); padding: 6px 10px; color: white; font-weight: bold; font-size: 13px; text-align: left; text-shadow: 1px 1px 2px rgba(0,0,0,0.4);">
                Gestor de Asistencia - Verificación
            </div>
            <!-- Contenido principal -->
            <div style="padding: 30px 20px; background-color: #ECE9D8;">
                <div style="background-color: white; border: 1px solid #ACA899; padding: 20px; border-radius: 4px;">
                    <h2 style="color: #0F172A; margin-top: 0; font-family: 'Trebuchet MS', sans-serif;">¡Hola, Profesor!</h2>
                    <p style="color: #475569; font-size: 14px; margin-bottom: 25px;">Para completar tu registro de forma segura, introduce el siguiente código en la aplicación:</p>
                    
                    <div style="background-color: #FFFFFF; border: 2px inset #ACA899; padding: 15px; text-align: center;">
                        <span style="font-size: 32px; font-weight: bold; color: #2563EB; font-family: 'Courier New', monospace; letter-spacing: 8px;">{{codigo}}</span>
                    </div>
                    
                    <p style="color: #64748B; font-size: 12px; margin-top: 25px; margin-bottom: 0;">Si tú no has solicitado este registro, puedes cerrar esta ventana con la X roja de arriba a la derecha (es broma, solo ignora el correo).</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
